<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
  <title>极速躲避 — 如翼</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box;}
    body{
      background:#0d0d14;
      display:flex;flex-direction:column;
      align-items:center;justify-content:center;
      min-height:100vh;overflow:hidden;
      font-family:"PingFang SC",sans-serif;
      user-select:none;-webkit-tap-highlight-color:transparent;
    }
    canvas{display:block;border-radius:12px;box-shadow:0 0 60px rgba(120,100,240,.35);}
    #hud{
      position:fixed;top:14px;left:50%;transform:translateX(-50%);
      display:flex;gap:28px;
      background:rgba(0,0,0,.55);backdrop-filter:blur(10px);
      border:1px solid rgba(255,255,255,.12);border-radius:40px;
      padding:7px 28px;color:#fff;font-size:15px;font-weight:700;
      pointer-events:none;
    }
    #hud span{color:#b8a0ff;}
    #overlay{
      position:fixed;inset:0;background:rgba(10,10,18,.9);
      display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;
    }
    #overlay h1{font-size:38px;color:#fff;font-weight:800;}
    #overlay .sub{font-size:15px;color:#777;text-align:center;line-height:1.8;}
    #overlay .fs{font-size:26px;color:#a08cff;font-weight:700;}
    #overlay button{
      margin-top:10px;padding:13px 52px;border-radius:50px;border:none;
      background:linear-gradient(135deg,#7c6ef7,#e06cfa);
      color:#fff;font-size:17px;font-weight:700;cursor:pointer;
      transition:transform .15s;
    }
    #overlay button:hover{transform:scale(1.05);}
    #ctrl{
      position:fixed;bottom:24px;left:0;right:0;
      display:flex;justify-content:center;gap:36px;
      pointer-events:none;
    }
    .cb{
      width:76px;height:76px;border-radius:50%;
      background:rgba(255,255,255,.1);border:2px solid rgba(255,255,255,.18);
      color:#fff;font-size:30px;display:flex;align-items:center;justify-content:center;
      cursor:pointer;pointer-events:all;backdrop-filter:blur(6px);
    }
    .cb:active{background:rgba(160,140,255,.45);}
    #back{position:fixed;top:18px;left:18px;color:#666;text-decoration:none;font-size:13px;}
    #back:hover{color:#fff;}
  </style>
</head>
<body>
<a href="index.html" id="back">← 返回</a>
<div id="hud">🏁 分数：<span id="sc">0</span> &nbsp; 最高：<span id="bs">0</span></div>
<canvas id="c"></canvas>
<div id="overlay">
  <h1>🚗 极速躲避</h1>
  <p class="sub">左右移动，躲开障碍车<br>速度越来越快，坚持到底！</p>
  <p class="sub">键盘 ← → &nbsp;或&nbsp; 点击下方按钮</p>
  <div id="fd" style="display:none"><p class="fs">得分：<span id="fsc">0</span></p></div>
  <button id="sbtn">开始游戏</button>
</div>
<div id="ctrl">
  <div class="cb" id="lb">←</div>
  <div class="cb" id="rb">→</div>
</div>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let W, H, LANES = 3, state = 'idle';
let score = 0, best = 0, frame = 0, speed = 5;
let player = {lane:1, x:0, tx:0, y:0, w:36, h:62};
let obstacles = [], spawnTimer = 0, spawnInterval = 70;
let particles = [], skids = [];

function resize(){
  W = Math.min(window.innerWidth, 420);
  H = Math.min(window.innerHeight, 740);
  canvas.width = W; canvas.height = H;
}
resize();
window.addEventListener('resize', resize);

function laneX(l){ return (W / LANES) * l + W / LANES / 2; }

function init(){
  score=0; frame=0; speed=5; obstacles=[]; particles=[]; skids=[];
  spawnTimer=0; spawnInterval=70;
  player.lane=1; player.y=H-100;
  player.x=laneX(1); player.tx=player.x;
  document.getElementById('sc').textContent=0;
}

/* ── Car drawing ── */
function drawCar(cx, cy, w, h, body, roof, front){
  const x=-w/2, y=-h/2;
  ctx.save(); ctx.translate(cx, cy);

  // Drop shadow
  ctx.fillStyle='rgba(0,0,0,0.28)';
  ctx.beginPath(); ctx.ellipse(2, h/2-2, w/2+2, 7, 0, 0, Math.PI*2); ctx.fill();

  // Wheels (behind body)
  ctx.fillStyle='#0f0f0f';
  const ww=10, wh=17, wr=3;
  [[-w/2-3,-h/2+10],[w/2-7,-h/2+10],[-w/2-3,h/2-26],[w/2-7,h/2-26]].forEach(([wx,wy])=>{
    ctx.beginPath(); ctx.roundRect(wx,wy,ww,wh,wr); ctx.fill();
    // Rim
    ctx.fillStyle='#333';
    ctx.beginPath(); ctx.roundRect(wx+2,wy+3,ww-4,wh-6,2); ctx.fill();
    ctx.fillStyle='#0f0f0f';
  });

  // Body
  ctx.fillStyle=body;
  ctx.beginPath();
  ctx.moveTo(x+10, y);
  ctx.lineTo(x+w-10, y);
  ctx.quadraticCurveTo(x+w+2, y, x+w+2, y+10);
  ctx.lineTo(x+w+2, y+h-14);
  ctx.quadraticCurveTo(x+w+2, y+h, x+w-6, y+h);
  ctx.lineTo(x+6, y+h);
  ctx.quadraticCurveTo(x-2, y+h, x-2, y+h-14);
  ctx.lineTo(x-2, y+10);
  ctx.quadraticCurveTo(x-2, y, x+10, y);
  ctx.closePath(); ctx.fill();

  // Hood crease lines
  ctx.strokeStyle='rgba(255,255,255,0.1)';
  ctx.lineWidth=1.2;
  ctx.beginPath(); ctx.moveTo(x+5,y+5); ctx.lineTo(x+w/2,y+18); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(x+w-5,y+5); ctx.lineTo(x+w/2,y+18); ctx.stroke();

  // Cabin
  ctx.fillStyle=roof;
  ctx.beginPath(); ctx.roundRect(x+7, y+h*.22, w-10, h*.38, 5); ctx.fill();

  // Windshield
  ctx.fillStyle='rgba(130,210,255,0.52)';
  ctx.beginPath(); ctx.roundRect(x+9, y+h*.23, w-14, h*.15, 4); ctx.fill();
  // Glare
  ctx.fillStyle='rgba(255,255,255,0.22)';
  ctx.beginPath(); ctx.roundRect(x+10, y+h*.24, (w-15)*.38, 4, 2); ctx.fill();

  // Rear window
  ctx.fillStyle='rgba(130,210,255,0.32)';
  ctx.beginPath(); ctx.roundRect(x+9, y+h*.59-2, w-14, h*.12, 4); ctx.fill();

  // Headlights / taillights
  if(front){
    ctx.shadowColor='#fff4aa'; ctx.shadowBlur=14;
    ctx.fillStyle='#ffe97a';
    [[x+4,y+5],[x+w-12,y+5]].forEach(([lx,ly])=>{
      ctx.beginPath(); ctx.ellipse(lx+4,ly+3,5,3.5,0,0,Math.PI*2); ctx.fill();
    });
    ctx.shadowBlur=0;
  } else {
    ctx.shadowColor='#ff3344'; ctx.shadowBlur=12;
    ctx.fillStyle='#ff5566';
    [[x+4,y+h-8],[x+w-12,y+h-8]].forEach(([lx,ly])=>{
      ctx.beginPath(); ctx.ellipse(lx+4,ly-2,5,3,0,0,Math.PI*2); ctx.fill();
    });
    ctx.shadowBlur=0;
  }
  ctx.restore();
}

/* ── Road drawing ── */
let roadLineY=[0,150,300,450,600,750,900];
function drawRoad(){
  // Sky / ground sides
  const grad=ctx.createLinearGradient(0,0,W,0);
  grad.addColorStop(0,'#141a10'); grad.addColorStop(0.5,'#1a1a2e'); grad.addColorStop(1,'#141a10');
  ctx.fillStyle=grad; ctx.fillRect(0,0,W,H);

  const rl=W*.08, rr=W*.92, rw=rr-rl;

  // Asphalt
  const ag=ctx.createLinearGradient(rl,0,rr,0);
  ag.addColorStop(0,'#252530'); ag.addColorStop(0.5,'#2e2e3e'); ag.addColorStop(1,'#252530');
  ctx.fillStyle=ag; ctx.fillRect(rl,0,rw,H);

  // Rumble strips (L & R)
  [rl,rr-8].forEach(rx=>{
    for(let y=0;y<H;y+=24){
      ctx.fillStyle= (Math.floor(y/24)%2===0) ? '#cc2222' : '#fff';
      ctx.fillRect(rx,y,8,12);
    }
  });

  // Lane dividers
  ctx.strokeStyle='rgba(255,255,230,0.35)';
  ctx.lineWidth=3; ctx.setLineDash([32,22]);
  roadLineY=roadLineY.map(y=>{
    y+=speed; if(y>H+40) y-=H+200;
    return y;
  });
  for(let l=1;l<LANES;l++){
    const lx=rl+rw/LANES*l;
    ctx.beginPath(); ctx.moveTo(lx,-10); ctx.lineTo(lx,H+10); ctx.stroke();
  }
  ctx.setLineDash([]);

  // Road edge lines (solid white)
  ctx.strokeStyle='rgba(255,255,255,0.6)'; ctx.lineWidth=2.5;
  ctx.beginPath(); ctx.moveTo(rl+8,0); ctx.lineTo(rl+8,H); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(rr-8,0); ctx.lineTo(rr-8,H); ctx.stroke();
}

/* ── Obstacle colors ── */
const OBS_COLORS=[
  ['#e84040','#992020'],['#e8a030','#a06010'],
  ['#30c0a0','#187060'],['#5090e8','#2050a0'],
  ['#e040c0','#802060'],
];

function spawnObstacle(){
  const lane=Math.floor(Math.random()*LANES);
  const [body,roof]=OBS_COLORS[Math.floor(Math.random()*OBS_COLORS.length)];
  obstacles.push({lane, x:laneX(lane), y:-80, w:36, h:62, body, roof});
}

/* ── Exhaust particles ── */
function spawnParticles(x,y){
  for(let i=0;i<2;i++){
    particles.push({
      x:x+(Math.random()-.5)*8, y,
      vx:(Math.random()-.5)*.6, vy:Math.random()*1.5+.5,
      life:1, r:Math.random()*4+2,
    });
  }
}

function updateParticles(){
  particles=particles.filter(p=>p.life>0);
  particles.forEach(p=>{ p.x+=p.vx; p.y+=p.vy; p.life-=0.04; });
}

function drawParticles(){
  particles.forEach(p=>{
    ctx.globalAlpha=p.life*.5;
    ctx.fillStyle='#aaa';
    ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,Math.PI*2); ctx.fill();
  });
  ctx.globalAlpha=1;
}

/* ── Collision ── */
function hit(){
  for(const ob of obstacles){
    if(Math.abs(player.x-ob.x)<(player.w+ob.w)/2-8 && Math.abs(player.y-ob.y)<(player.h+ob.h)/2-10) return true;
  }
  return false;
}

/* ── Explosion ── */
function explode(x,y){
  for(let i=0;i<30;i++){
    const a=Math.random()*Math.PI*2, s=Math.random()*7+2;
    particles.push({
      x,y, vx:Math.cos(a)*s, vy:Math.sin(a)*s,
      life:1, r:Math.random()*8+3,
      color:['#ff6b6b','#ffa500','#ffff00','#fff'][Math.floor(Math.random()*4)],
    });
  }
}
function drawExplosion(){
  particles.forEach(p=>{
    if(!p.color) return;
    p.x+=p.vx; p.y+=p.vy; p.vx*=.9; p.vy*=.9; p.life-=.028;
    ctx.globalAlpha=Math.max(0,p.life);
    ctx.fillStyle=p.color;
    ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,Math.PI*2); ctx.fill();
  });
  ctx.globalAlpha=1;
}

/* ── Input ── */
document.addEventListener('keydown',e=>{
  if(state!=='playing') return;
  if((e.key==='ArrowLeft'||e.key==='a')&&player.lane>0){player.lane--;player.tx=laneX(player.lane);}
  if((e.key==='ArrowRight'||e.key==='d')&&player.lane<LANES-1){player.lane++;player.tx=laneX(player.lane);}
});
document.getElementById('lb').addEventListener('pointerdown',()=>{if(state==='playing'&&player.lane>0){player.lane--;player.tx=laneX(player.lane);}});
document.getElementById('rb').addEventListener('pointerdown',()=>{if(state==='playing'&&player.lane<LANES-1){player.lane++;player.tx=laneX(player.lane);}});

/* ── Game loop ── */
let dead=false;
function loop(){
  ctx.clearRect(0,0,W,H);
  drawRoad();

  if(state!=='playing'){
    if(dead){
      drawExplosion();
      if(!particles.filter(p=>p.color).length) dead=false;
    }
    requestAnimationFrame(loop); return;
  }

  frame++;
  score=Math.floor(frame/6);
  speed=5+score*.02;
  spawnInterval=Math.max(28,70-score*.35);
  document.getElementById('sc').textContent=score;

  // Player smooth
  player.x+=(player.tx-player.x)*.22;
  spawnParticles(player.x, player.y+player.h/2-4);
  updateParticles();

  // Obstacles
  spawnTimer++;
  if(spawnTimer>=spawnInterval){ spawnObstacle(); spawnTimer=0; }
  obstacles=obstacles.filter(o=>o.y<H+80);
  obstacles.forEach(o=>o.y+=speed);

  // Draw exhaust
  drawParticles();

  // Draw obstacles
  obstacles.forEach(o=>drawCar(o.x,o.y,o.w,o.h,o.body,o.roof,false));

  // Draw player
  drawCar(player.x,player.y,player.w,player.h,'#7c6ef7','#3a2fa0',true);

  // Glow under player car
  ctx.shadowColor='#7c6ef7'; ctx.shadowBlur=20;
  ctx.fillStyle='rgba(124,110,247,0.35)';
  ctx.beginPath(); ctx.ellipse(player.x,player.y+player.h/2-2,12,4,0,0,Math.PI*2); ctx.fill();
  ctx.shadowBlur=0;

  if(hit()){
    state='gameover'; dead=true;
    if(score>best) best=score;
    document.getElementById('bs').textContent=best;
    explode(player.x,player.y);
    setTimeout(showDead,700);
  }
  requestAnimationFrame(loop);
}

function showDead(){
  document.getElementById('fd').style.display='block';
  document.getElementById('fsc').textContent=score;
  document.getElementById('overlay').querySelector('h1').textContent='💥 游戏结束';
  document.getElementById('overlay').querySelector('.sub').textContent='再来一次？';
  document.getElementById('sbtn').textContent='再玩一次';
  document.getElementById('overlay').style.display='flex';
}

document.getElementById('sbtn').addEventListener('click',()=>{
  document.getElementById('fd').style.display='none';
  document.getElementById('overlay').style.display='none';
  particles=[];
  init(); state='playing';
});

init();
requestAnimationFrame(loop);
</script>
</body>
</html>
