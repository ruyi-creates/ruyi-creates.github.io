<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
  <title>豆豆吃金币 — 如翼</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box;}
    body{
      background:#0d0d14;display:flex;flex-direction:column;
      align-items:center;justify-content:center;
      min-height:100vh;overflow:hidden;
      font-family:"PingFang SC",sans-serif;
      user-select:none;-webkit-tap-highlight-color:transparent;
    }
    canvas{display:block;border-radius:10px;box-shadow:0 0 50px rgba(224,108,250,.28);}
    #hud{
      position:fixed;top:12px;left:50%;transform:translateX(-50%);
      display:flex;gap:20px;
      background:rgba(0,0,0,.6);backdrop-filter:blur(10px);
      border:1px solid rgba(255,255,255,.1);border-radius:40px;
      padding:7px 24px;color:#fff;font-size:14px;font-weight:700;
      pointer-events:none;white-space:nowrap;
    }
    #hud span{color:#e06cfa;}
    #overlay{
      position:fixed;inset:0;background:rgba(10,10,18,.92);
      display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;
    }
    #overlay h1{font-size:36px;color:#fff;font-weight:800;}
    #overlay p{font-size:14px;color:#666;text-align:center;line-height:1.9;}
    #overlay .fs{font-size:24px;color:#e06cfa;font-weight:700;}
    #overlay button{
      margin-top:10px;padding:13px 52px;border-radius:50px;border:none;
      background:linear-gradient(135deg,#e06cfa,#7c6ef7);
      color:#fff;font-size:17px;font-weight:700;cursor:pointer;
      transition:transform .15s;
    }
    #overlay button:hover{transform:scale(1.05);}
    /* D-pad */
    #dpad{
      position:fixed;bottom:20px;left:50%;transform:translateX(-50%);
      display:grid;grid-template-columns:repeat(3,64px);grid-template-rows:repeat(3,64px);gap:5px;
    }
    .dp{
      border-radius:10px;background:rgba(255,255,255,.1);
      border:1px solid rgba(255,255,255,.15);
      color:#fff;font-size:24px;display:flex;align-items:center;justify-content:center;
      cursor:pointer;backdrop-filter:blur(6px);
    }
    .dp:active{background:rgba(224,108,250,.4);}
    .dp.e{background:transparent;border:none;pointer-events:none;}
    #back{position:fixed;top:16px;left:16px;color:#555;text-decoration:none;font-size:13px;}
    #back:hover{color:#fff;}
    @media(min-width:540px){#dpad{display:none;}}
  </style>
</head>
<body>
<a href="index.html" id="back">← 返回</a>
<div id="hud">🪙 <span id="sc">0</span> &nbsp; ⏱️ <span id="tm">60</span>s &nbsp; 剩余金币 <span id="left">0</span></div>
<canvas id="c"></canvas>
<div id="overlay">
  <h1>🫧 豆豆吃金币</h1>
  <p>吃掉所有金币！碰到幽灵立即结束<br>60秒计时，吃得越多越好</p>
  <p>方向键 / WASD / 滑动屏幕 控制</p>
  <div id="fd" style="display:none"><p class="fs">得分：<span id="fsc">0</span> 🪙</p></div>
  <button id="sbtn">开始游戏</button>
</div>
<div id="dpad">
  <div class="dp e"></div><div class="dp" id="u">↑</div><div class="dp e"></div>
  <div class="dp" id="l">←</div><div class="dp e"></div><div class="dp" id="r">→</div>
  <div class="dp e"></div><div class="dp" id="d">↓</div><div class="dp e"></div>
</div>

<script>
const canvas=document.getElementById('c');
const ctx=canvas.getContext('2d');

// ── Grid config ──
const CELL=26;
let COLS,ROWS,state='idle';

function resize(){
  const W=Math.min(window.innerWidth,720);
  const H=Math.min(window.innerHeight-68,600);
  COLS=Math.floor(W/CELL)|0;
  ROWS=Math.floor(H/CELL)|0;
  canvas.width=COLS*CELL;
  canvas.height=ROWS*CELL;
}
resize();
window.addEventListener('resize',()=>{resize(); if(state==='playing') initGame();});

// ── State ──
let walls,coins,player,ghosts,score,timerSec,lastTick,animId,frame=0;

// ── Smooth movement system ──
// Each entity: { c,r (current cell), nc,nr (next cell), prog (0-1), dx,dy, speed }
// prog 0 = at (c,r), prog 1 = at (nc,nr)
// pixel pos = lerp(c,nc,prog)*CELL + CELL/2
function cellPx(e){ return e.c*CELL+CELL/2+(e.nc-e.c)*e.prog*CELL; }
function cellPy(e){ return e.r*CELL+CELL/2+(e.nr-e.r)*e.prog*CELL; }
function isWall(c,r){ return c<0||r<0||c>=COLS||r>=ROWS||walls.has(`${c},${r}`); }

// ── Wall generation ──
function buildWalls(){
  walls=new Set();
  // Border
  for(let c=0;c<COLS;c++){ walls.add(`${c},0`); walls.add(`${c},${ROWS-1}`); }
  for(let r=0;r<ROWS;r++){ walls.add(`0,${r}`); walls.add(`${COLS-1},${r}`); }
  // Inner blocks — distributed evenly
  const mc=Math.floor(COLS/2), mr=Math.floor(ROWS/2);
  const blks=[
    // Corners
    [2,2],[3,2],[2,3],[3,3],
    [COLS-4,2],[COLS-3,2],[COLS-4,3],[COLS-3,3],
    [2,ROWS-4],[3,ROWS-4],[2,ROWS-3],[3,ROWS-3],
    [COLS-4,ROWS-4],[COLS-3,ROWS-4],[COLS-4,ROWS-3],[COLS-3,ROWS-3],
    // Cross arms
    [mc-3,mr],[mc-2,mr],[mc+2,mr],[mc+3,mr],
    [mc,mr-3],[mc,mr-2],[mc,mr+2],[mc,mr+3],
    // Mid-row obstacles
    [mc-5,3],[mc+5,3],[mc-5,ROWS-4],[mc+5,ROWS-4],
    [2,mr-1],[2,mr],[2,mr+1],
    [COLS-3,mr-1],[COLS-3,mr],[COLS-3,mr+1],
    [mc-1,2],[mc,2],[mc+1,2],
    [mc-1,ROWS-3],[mc,ROWS-3],[mc+1,ROWS-3],
  ];
  blks.forEach(([c,r])=>{ if(c>0&&r>0&&c<COLS-1&&r<ROWS-1) walls.add(`${c},${r}`); });
}

// ── Init ──
function initGame(){
  buildWalls();
  score=0; timerSec=60; frame=0;
  document.getElementById('sc').textContent=0;
  document.getElementById('tm').textContent=60;

  // Coins on every empty cell
  coins=new Set();
  for(let r=1;r<ROWS-1;r++)
    for(let c=1;c<COLS-1;c++)
      if(!walls.has(`${c},${r}`)) coins.add(`${c},${r}`);

  // Player start
  const ps={c:2,r:2};
  player={c:ps.c,r:ps.r,nc:ps.c,nr:ps.r,prog:1,dx:0,dy:0,wdx:1,wdy:0,speed:.16,mouth:0,mdir:1};
  coins.delete(`${ps.c},${ps.r}`);

  // 3 ghosts
  const gStarts=[
    {c:COLS-3,r:ROWS-3,color:'#ff6b9d',speed:.1},
    {c:COLS-3,r:2,     color:'#ff9f43',speed:.11},
    {c:Math.floor(COLS/2),r:Math.floor(ROWS/2),color:'#48dbfb',speed:.12},
  ];
  ghosts=gStarts.map(g=>{
    coins.delete(`${g.c},${g.r}`);
    const rd=randomDir(g.c,g.r);
    return {...g,nc:g.c+rd.dx,nr:g.r+rd.dy,prog:0,dx:rd.dx,dy:rd.dy,scared:false,scaredT:0};
  });
  document.getElementById('left').textContent=coins.size;
}

function randomDir(c,r){
  const opts=[{dx:1,dy:0},{dx:-1,dy:0},{dx:0,dy:1},{dx:0,dy:-1}]
    .filter(d=>!isWall(c+d.dx,r+d.dy));
  return opts.length ? opts[Math.floor(Math.random()*opts.length)] : {dx:0,dy:0};
}

// ── Movement ──
function stepEntity(e, wantDx, wantDy){
  // Only commit next cell when current move finishes
  if(e.prog<1){ e.prog=Math.min(1,e.prog+e.speed); return; }
  // Arrived at nc,nr
  e.c=e.nc; e.r=e.nr;
  // Try wanted direction
  if(!isWall(e.c+wantDx,e.r+wantDy)&&(wantDx!==0||wantDy!==0)){
    e.dx=wantDx; e.dy=wantDy;
  }
  // Try current direction
  if(!isWall(e.c+e.dx,e.r+e.dy)){
    e.nc=e.c+e.dx; e.nr=e.r+e.dy; e.prog=0;
  } else {
    e.nc=e.c; e.nr=e.r; e.prog=1; // stopped
  }
}

function stepGhost(g){
  if(g.prog<1){ g.prog=Math.min(1,g.prog+g.speed); return; }
  g.c=g.nc; g.r=g.nr;
  // Pick next direction — bias toward player
  const opts=[{dx:1,dy:0},{dx:-1,dy:0},{dx:0,dy:1},{dx:0,dy:-1}]
    .filter(d=>!isWall(g.c+d.dx,g.r+d.dy)&&!(d.dx===-g.dx&&d.dy===-g.dy));
  if(!opts.length) return;
  let pick;
  if(!g.scared&&Math.random()<.55){
    opts.sort((a,b)=>{
      const da=Math.abs(g.c+a.dx-player.c)+Math.abs(g.r+a.dy-player.r);
      const db=Math.abs(g.c+b.dx-player.c)+Math.abs(g.r+b.dy-player.r);
      return da-db;
    });
    pick=opts[0];
  } else { pick=opts[Math.floor(Math.random()*opts.length)]; }
  g.dx=pick.dx; g.dy=pick.dy;
  g.nc=g.c+g.dx; g.nr=g.r+g.dy; g.prog=0;
  if(g.scared){ g.scaredT--; if(g.scaredT<=0) g.scared=false; }
}

// ── Collision (pixel distance check) ──
function checkGhostCollision(){
  const px=cellPx(player), py=cellPy(player);
  for(const g of ghosts){
    const gx=cellPx(g), gy=cellPy(g);
    const dist=Math.hypot(px-gx,py-gy);
    if(dist<CELL*.72){
      if(g.scared){
        // Eat ghost — reset to center
        g.c=Math.floor(COLS/2); g.r=Math.floor(ROWS/2);
        g.nc=g.c; g.nr=g.r; g.prog=1;
        g.scared=false; score+=5;
      } else {
        return 'dead';
      }
    }
  }
  return null;
}

// ── Drawing ──
function drawWalls(){
  ctx.fillStyle='#0e0e1e';
  ctx.fillRect(0,0,canvas.width,canvas.height);
  walls.forEach(key=>{
    const[c,r]=key.split(',').map(Number);
    ctx.fillStyle='#1a1a30';
    ctx.fillRect(c*CELL,r*CELL,CELL,CELL);
    ctx.strokeStyle='rgba(100,90,200,0.4)';
    ctx.lineWidth=1;
    ctx.strokeRect(c*CELL+.5,r*CELL+.5,CELL-1,CELL-1);
  });
}

let coinPulse=0;
function drawCoins(){
  coinPulse+=0.06;
  const glow=4+Math.sin(coinPulse)*2;
  coins.forEach(key=>{
    const[c,r]=key.split(',').map(Number);
    const cx=c*CELL+CELL/2, cy=r*CELL+CELL/2;
    ctx.shadowColor='#ffd700'; ctx.shadowBlur=glow;
    ctx.fillStyle='#ffd700';
    ctx.beginPath(); ctx.arc(cx,cy,4.5,0,Math.PI*2); ctx.fill();
    // Inner shine
    ctx.shadowBlur=0;
    ctx.fillStyle='rgba(255,255,200,0.7)';
    ctx.beginPath(); ctx.arc(cx-1.2,cy-1.2,1.8,0,Math.PI*2); ctx.fill();
  });
  ctx.shadowBlur=0;
}

function drawPlayer(){
  const px=cellPx(player), py=cellPy(player);
  player.mouth+=0.14*player.mdir;
  if(player.mouth>0.42||player.mouth<0) player.mdir*=-1;
  const angle=Math.atan2(player.dy,player.dx);
  const m=player.mouth;
  ctx.shadowColor='#e06cfa'; ctx.shadowBlur=16;
  ctx.fillStyle='#e06cfa';
  ctx.beginPath();
  ctx.moveTo(px,py);
  ctx.arc(px,py,CELL/2-2,angle+m,angle+Math.PI*2-m);
  ctx.closePath(); ctx.fill();
  ctx.shadowBlur=0;
  // Eye
  const ex=px+Math.cos(angle-.5)*6, ey=py+Math.sin(angle-.5)*6;
  ctx.fillStyle='#0d0d14';
  ctx.beginPath(); ctx.arc(ex,ey,2.5,0,Math.PI*2); ctx.fill();
}

function drawGhosts(){
  ghosts.forEach(g=>{
    const gx=cellPx(g), gy=cellPy(g);
    const r=CELL/2-2;
    const flash=g.scared&&g.scaredT<50&&frame%14<7;
    const col=g.scared?(flash?'#ffffff':'#7c6ef7'):g.color;
    ctx.shadowColor=col; ctx.shadowBlur=10;
    ctx.fillStyle=col;
    // Head
    ctx.beginPath(); ctx.arc(gx,gy-2,r,Math.PI,0); ctx.lineTo(gx+r,gy+r);
    // Wavy skirt
    const seg=3,sw=r*2/seg;
    for(let i=seg;i>=0;i--){
      const bx=gx+r-i*sw, by=gy+r+(i%2===0?-5:5);
      ctx.lineTo(bx,by);
    }
    ctx.lineTo(gx-r,gy-2); ctx.closePath(); ctx.fill();
    ctx.shadowBlur=0;
    // Eyes
    if(!g.scared){
      [-5,5].forEach(ox=>{
        ctx.fillStyle='#fff'; ctx.beginPath(); ctx.ellipse(gx+ox,gy-4,4,5,0,0,Math.PI*2); ctx.fill();
        ctx.fillStyle='#1a1a3e'; ctx.beginPath(); ctx.ellipse(gx+ox+1,gy-3,2,3,0,0,Math.PI*2); ctx.fill();
      });
    } else {
      ctx.fillStyle='#fff'; ctx.font='bold 9px sans-serif'; ctx.textAlign='center';
      ctx.fillText('×  ×',gx,gy-1);
    }
  });
}

// ── Game tick ──
function tick(){
  // Move player
  stepEntity(player, player.wdx, player.wdy);
  // Pick up coin
  const key=`${player.c},${player.r}`;
  if(coins.has(key)){
    coins.delete(key);
    score++;
    document.getElementById('sc').textContent=score;
    document.getElementById('left').textContent=coins.size;
    if(score>0&&score%15===0) ghosts.forEach(g=>{g.scared=true;g.scaredT=150;});
    if(coins.size===0){ endGame('win'); return; }
  }
  // Move ghosts
  ghosts.forEach(g=>stepGhost(g));
  // Collision
  const res=checkGhostCollision();
  if(res==='dead'){ endGame('dead'); return; }
}

// ── Render ──
function render(){
  drawWalls();
  drawCoins();
  drawPlayer();
  drawGhosts();
}

let lastSec=0;
function loop(ts){
  if(state!=='playing'){ animId=requestAnimationFrame(loop); return; }
  frame++;
  // Timer
  if(!lastSec) lastSec=ts;
  if(ts-lastSec>=1000){ lastSec=ts; timerSec--; document.getElementById('tm').textContent=timerSec; }
  if(timerSec<=0){ endGame('timeout'); return; }
  // 60fps consistent tick
  tick();
  render();
  animId=requestAnimationFrame(loop);
}

function endGame(reason){
  state='idle';
  const ov=document.getElementById('overlay');
  document.getElementById('fsc').textContent=score;
  document.getElementById('fd').style.display='block';
  ov.querySelector('h1').textContent= reason==='win'?'🎉 全部吃完！': reason==='dead'?'💀 被幽灵抓住了！':'⏰ 时间到！';
  ov.querySelector('p').textContent= reason==='win'?'完美！你吃掉了所有金币！': reason==='dead'?'小心幽灵，下次一定！':'60秒结束，看看你的成绩！';
  document.getElementById('sbtn').textContent='再玩一次';
  ov.style.display='flex';
}

// ── Input ──
document.addEventListener('keydown',e=>{
  if(state!=='playing') return;
  const m={ArrowLeft:{dx:-1,dy:0},ArrowRight:{dx:1,dy:0},ArrowUp:{dx:0,dy:-1},ArrowDown:{dx:0,dy:1},
           a:{dx:-1,dy:0},d:{dx:1,dy:0},w:{dx:0,dy:-1},s:{dx:0,dy:1}};
  if(m[e.key]){ player.wdx=m[e.key].dx; player.wdy=m[e.key].dy; e.preventDefault(); }
});
const dmap={l:{dx:-1,dy:0},r:{dx:1,dy:0},u:{dx:0,dy:-1},d:{dx:0,dy:1}};
Object.entries(dmap).forEach(([id,d])=>{
  document.getElementById(id).addEventListener('pointerdown',()=>{
    if(state==='playing'){ player.wdx=d.dx; player.wdy=d.dy; }
  });
});
// Swipe
let ts0=null;
canvas.addEventListener('touchstart',e=>{ ts0={x:e.touches[0].clientX,y:e.touches[0].clientY}; },{passive:true});
canvas.addEventListener('touchend',e=>{
  if(!ts0||state!=='playing') return;
  const dx=e.changedTouches[0].clientX-ts0.x, dy=e.changedTouches[0].clientY-ts0.y;
  if(Math.abs(dx)>Math.abs(dy)){ player.wdx=dx>0?1:-1; player.wdy=0; }
  else { player.wdx=0; player.wdy=dy>0?1:-1; }
  ts0=null;
},{passive:true});

document.getElementById('sbtn').addEventListener('click',()=>{
  document.getElementById('fd').style.display='none';
  document.getElementById('overlay').style.display='none';
  initGame(); state='playing'; lastSec=0; frame=0;
  cancelAnimationFrame(animId);
  animId=requestAnimationFrame(loop);
});

initGame(); render();
animId=requestAnimationFrame(loop);
</script>
</body>
</html>
